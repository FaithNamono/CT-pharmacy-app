
name: ct_app
description: CT Pharmacy Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  image_picker: ^1.0.5
  intl: ^0.19.0
  connectivity_plus: ^6.1.5
  path: ^1.9.1
  sqflite: ^2.4.2
  flutter_form_builder: ^9.7.0
  dropdown_search: ^5.0.6
  mobile_scanner: ^5.2.3
  pdf: ^3.11.3
  csv: ^6.0.0
  syncfusion_flutter_datagrid: ^24.2.9
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.11.1
  json_serializable: ^6.12.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/logo.jpg
    - assets/images/inventory.jpg
    - assets/images/prescription.jpg
    - assets/images/sales.jpg
  # Remove these lines until you create the directories:
  # - assets/icons/
  # - assets/data/
  
  # Remove fonts section until you add the font files:
